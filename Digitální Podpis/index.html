<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podpis dokumentů</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-6xl mx-auto p-6">
  <div class="flex justify-between items-center mb-8">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">DP</div>
      <h1 class="text-2xl font-semibold text-gray-900">Digitální Podpis</h1>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <!-- Levý panel -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-white rounded-2xl shadow p-6">
        <h2 class="font-semibold mb-4">Nahrát dokument</h2>
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:border-blue-400 transition-colors cursor-pointer">
          <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
          <p class="text-gray-600">Přetáhni TXT soubor sem</p>
          <label class="mt-3 inline-block px-5 py-2 bg-blue-600 text-white rounded-lg cursor-pointer hover:bg-blue-700">
            Vybrat soubor
            <input type="file" id="fileInput" accept=".txt,.md" class="hidden">
          </label>
        </div>
        <div id="file-info" class="hidden mt-4 p-3 bg-gray-50 rounded-lg text-sm"></div>
      </div>

      <!-- Certifikát -->
      <div class="bg-white rounded-2xl shadow p-6">
        <h2 class="font-semibold mb-4">Podpisující osoba</h2>
        
        <input type="text" id="customName" 
               class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:border-blue-500"
               placeholder="Např. Ing. Jan Novotný" value="Ing. Jan Novák">

        <select id="certSelect" class="w-full p-3 border rounded-xl mb-3">
          <option value="">Nebo vyber z přednastavených</option>
          <option value="Ing. Jan Novák">Ing. Jan Novák</option>
          <option value="Mgr. Anna Svobodová">Mgr. Anna Svobodová</option>
          <option value="Firma s.r.o.">Firma s.r.o.</option>
        </select>

        <div class="text-xs text-gray-500 mt-2">Key bude vygenerován automaticky</div>
      </div>

      <button onclick="signDocument()" id="signBtn"
              class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl font-semibold text-lg shadow-lg hover:shadow-xl flex items-center justify-center gap-3">
        <i class="fas fa-signature"></i>
        <span>Podepsat dokument</span>
      </button>
    </div>

    <!-- Obsah dokumentu -->
    <div class="lg:col-span-8">
      <div class="bg-white rounded-2xl shadow p-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="font-semibold text-xl">Obsah dokumentu</h2>
          <div id="status" class="text-sm font-medium text-emerald-600"></div>
        </div>
        <textarea id="documentContent" class="document-area w-full h-[560px] p-6 text-lg border-0 focus:outline-none resize-none bg-gray-50 rounded-xl"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div id="successModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl p-10 max-w-lg w-full mx-4 text-center">
    <div class="w-20 h-20 mx-auto bg-green-100 rounded-full flex items-center justify-center mb-6">
      <i class="fas fa-check text-5xl text-green-600"></i>
    </div>
    <h3 class="text-2xl font-semibold mb-2">Dokument byl úspěšně podepsán!</h3>
    <div id="modalInfo" class="text-gray-600 mb-8"></div>
    
    <div class="flex gap-4">
      <button onclick="closeModal()" class="flex-1 py-4 border rounded-2xl hover:bg-gray-50">Zavřít</button>
      <button onclick="downloadSignedDocument()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl">Stáhnout</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
